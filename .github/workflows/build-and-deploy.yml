name: Build and Deploy

on:
  # Push to main always triggers a forced rebuild — code changes wouldn't be
  # caught by the Firestore-delta skip check in build-if-needed.ts.
  push:
    branches: [main]

  # Manual trigger from GitHub UI or API (workflow_dispatch from admin panel later)
  workflow_dispatch:
    inputs:
      force:
        description: "Force a rebuild even if nothing changed"
        required: false
        default: "false"

  # Daily rebuild at midnight Israel time (22:00 UTC) to refresh Daily Shuffle
  schedule:
    - cron: "0 22 * * *"
    # Twice an hour as a safety net so admin actions reach the live site
    # quickly. We deliberately avoid :00 and :30 (the busiest minutes on
    # GitHub Actions free tier — those slots get throttled hard) and pick
    # off-peak minutes (:07 and :37) which fire much closer to on-time.
    - cron: "7,37 * * * *"

# Prevent overlapping deploys when multiple pushes land in quick succession.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Smart build (skip if no changes)
        run: npx tsx scripts/build-if-needed.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FORCE_BUILD: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') || github.event.schedule == '0 22 * * *') && '1' || '0' }}
          GITHUB_ACTOR: ${{ github.actor }}

      # Runs after the build step so a deploy failure still lets us notify
      # about new submissions. Opens a GitHub issue on this repo — the
      # owner (Shahar) gets an automatic email from GitHub. Uses the
      # auto-provided GITHUB_TOKEN, no third-party services.
      - name: Notify admin about new pending businesses
        if: always()
        run: npx tsx scripts/notify-pending.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
