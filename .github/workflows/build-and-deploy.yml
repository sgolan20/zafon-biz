name: Build and Deploy

on:
  # Manual trigger from GitHub UI or API (workflow_dispatch from admin panel later)
  workflow_dispatch:
    inputs:
      force:
        description: "Force a rebuild even if nothing changed"
        required: false
        default: "false"

  # Daily rebuild at midnight Israel time (22:00 UTC) to refresh Daily Shuffle
  schedule:
    - cron: "0 22 * * *"
    # Also every 30 min as a safety net so newly-approved businesses appear soon
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Smart build (skip if no changes)
        run: npx tsx scripts/build-if-needed.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' && '1' || (github.event.schedule == '0 22 * * *' && '1' || '0') }}
          GITHUB_ACTOR: ${{ github.actor }}

      # Runs after the build step so a deploy failure still lets us notify
      # about new submissions. The script exits quietly if RESEND_API_KEY
      # is not configured, so this is a safe no-op until the secret is set.
      - name: Notify admin about new pending businesses
        if: always()
        run: npx tsx scripts/notify-pending.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
